<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Prediction App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Career Prediction App</h1>

   
    <div id="background-section">
      <h2>Select Your Background</h2>
      <div class="button-group">
        <button onclick="selectBackground('Computer Science')">Computer Science</button>
        <button onclick="selectBackground('Mechanical')">Mechanical</button>
        <button onclick="selectBackground('Business')">Business</button>
      </div>
    </div>

    <!-- Domain Section -->
    <div id="domain-section" style="display:none;">
      <h2>Select Domain</h2>
      <div id="domain-options" class="button-group"></div>
    </div>

    <!-- Result Section -->
    <div id="result-section" style="display:none;">
      <h2>Results</h2>
      <div id="result-text" class="result-box"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
