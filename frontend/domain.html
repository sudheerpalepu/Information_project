<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Domain</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main">
    <h1>Select a Domain</h1>

    <!-- Selected Background -->
    <p id="selected-bg" class="chip"></p>

    <!-- Domain Cards -->
    <div id="domain-options" class="grid grid-2"></div>
</div>

<!-- POPUP MODAL -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h3 id="popupTitle"></h3>
        <p>Are you sure you want to continue?</p>
        <div style="margin-top:15px;">
            <button onclick="confirmSelection()">Continue</button>
            <button onclick="closePopup()" class="btn-danger">Cancel</button>
        </div>
    </div>
</div>

<script src="js/domain.js"></script>
</body>
</html>
